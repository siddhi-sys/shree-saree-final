<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shree Saree | Jabalpur</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@400&display=swap" rel="stylesheet">
    <style>
        h1, h2, .brand { font-family: 'Playfair Display', serif; }
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-stone-50 text-stone-900">
    <nav class="flex justify-between items-center p-6 bg-white shadow-sm sticky top-0 z-50">
        <div class="brand text-2xl font-bold text-red-900">Shree Saree</div>
        <div class="space-x-8 text-sm uppercase tracking-widest font-medium">
            <a href="#home" class="hover:text-red-700">Home</a>
            <a href="#collection" class="hover:text-red-700">Collection</a>
            <a href="#contact" class="hover:text-red-700">Contact</a>
        </div>
    </nav>
    <section id="home" class="relative h-[60vh] flex items-center justify-center text-center bg-red-900 text-white">
        <div class="relative z-10 px-4">
            <h1 class="text-5xl md:text-6xl font-bold mb-4">Shree Saree Jabalpur</h1>
            <p class="text-xl italic opacity-90">Authentic Heritage Silks & Handlooms</p>
        </div>
    </section>
    <section id="collection" class="py-20 px-6 max-w-7xl mx-auto">
        <h2 class="text-3xl font-bold text-center mb-12">Our Signature Collection</h2>
        <div class="grid grid-cols-1 md:grid-cols-3 gap-8 text-center">
            <div class="bg-white p-3 shadow-md">
                <img src="https://images.unsplash.com/photo-1610030469983-98e550d6193c?w=500" class="w-full h-80 object-cover">
                <p class="mt-4 font-bold text-xl">Bridal Kanjeevaram</p>
            </div>
            <div class="bg-white p-3 shadow-md">
                <img src="https://images.unsplash.com/photo-1583391733956-3750e0ff4e8b?w=500" class="w-full h-80 object-cover">
                <p class="mt-4 font-bold text-xl">Banarasi Silk</p>
            </div>
            <div class="bg-white p-3 shadow-md">
                <img src="https://images.unsplash.com/photo-1617627143750-d86bc21e42bb?w=500" class="w-full h-80 object-cover">
                <p class="mt-4 font-bold text-xl">Designer Wear</p>
            </div>
        </div>
    </section>
    <footer id="contact" class="bg-stone-100 py-20 text-center">
        <h2 class="text-3xl mb-4 font-serif">Visit Us in Jabalpur</h2>
        <p class="text-lg text-stone-600 mb-8 font-medium">Main Market, Jabalpur, Madhya Pradesh</p>
        <button class="bg-red-800 text-white px-10 py-4 rounded-sm uppercase tracking-widest font-bold">WhatsApp Inquiry</button>
    </footer>
    <div class="bg-white py-6 text-center text-stone-400 text-xs tracking-widest">
        &copy; 2026 Shree Saree | Built for Project Submission
    </div>
</body>
</html>
